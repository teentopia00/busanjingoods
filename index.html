<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부산진성결교회 스마트 물품 관리 시스템</title>
  
  <!-- 라이브러리 CDN 로드 (React, Tailwind CSS, Firebase) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Compat 라이브러리 -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    @media print {
      .print-hide {
        display: none !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

  <div id="root"></div>

  <script type="text/babel">
    // 부산진성결교회 전용 파이어베이스 설정값 주입
    const firebaseConfig = {
      apiKey: "AIzaSyCQnYCmCXjPtyiV_7QitJoJetx25Ful17s",
      authDomain: "happynjin-13a6f.firebaseapp.com",
      projectId: "happynjin-13a6f",
      storageBucket: "happynjin-13a6f.firebasestorage.app",
      messagingSenderId: "516570678326",
      appId: "1:516570678326:web:5d2b8ac8c1b7d9de1c0497",
      measurementId: "G-3DQYV6V78W"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CATEGORIES = ['예배/강단', '미디어/방송', '사무/교육', '주방/식당', '차량/기계', '악기/음향', '기타'];
    
    // 부산진성결교회 맞춤형 장소 추천 리스트 (지하기도실, 교육관 등 반영)
    const SUGGESTED_LOCATIONS = [
      '본당', '재정부실', '주방', '목양실', '방송실', '사무실', '교육관', '식당', '지하기도실',
      '1층 포지티브홀', '쿰바야룸', '1층미니카페', '중3층 유아실', '본당 미니카페',
      '남자 화장실', '여자화장실', '주방창고', '교육관창고'
    ];

    // UI용 경량 인라인 SVG 아이콘 컴포넌트셋
    const Icon = {
      Search: () => (
        <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      ),
      Plus: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      ),
      Edit: () => (
        <svg className="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      ),
      Trash: () => (
        <svg className="w-4 h-4 text-rose-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      ),
      Disposal: () => (
        <svg className="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
          <polyline points="17 18 23 18 23 12"></polyline>
        </svg>
      ),
      Excel: () => (
        <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
      ),
      Printer: () => (
        <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
      ),
      Close: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      )
    };

    function App() {
      const [user, setUser] = React.useState(null);
      const [items, setItems] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [searchTerm, setSearchTerm] = React.useState('');
      const [selectedCategory, setSelectedCategory] = React.useState('전체');
      const [selectedStatus, setSelectedStatus] = React.useState('전체');
      
      // 모달/UI 제어 상태
      const [isFormOpen, setIsFormOpen] = React.useState(false);
      const [isDisposalOpen, setIsDisposalOpen] = React.useState(false);
      const [isDeleteOpen, setIsDeleteOpen] = React.useState(false);
      const [editingItem, setEditingItem] = React.useState(null);
      const [targetItemId, setTargetItemId] = React.useState(null);

      // 토스트 피드백 메시지
      const [successMsg, setSuccessMsg] = React.useState('');
      const [errorMsg, setErrorMsg] = React.useState('');

      // 입력 데이터 폼 양식
      const [formData, setFormData] = React.useState({
        name: '', category: '예배/강단', quantity: 1, location: '',
        purchaseDate: new Date().toISOString().split('T')[0], price: '', manager: '', memo: '', status: '사용중', disposalDate: '', disposalReason: ''
      });

      const [disposalForm, setDisposalForm] = React.useState({ date: new Date().toISOString().split('T')[0], reason: '' });
      const [isPrintFriendly, setIsPrintFriendly] = React.useState(false);

      // 토스트 발송기
      const triggerToast = (type, msg) => {
        if (type === 'success') {
          setSuccessMsg(msg);
          setTimeout(() => setSuccessMsg(''), 3000);
        } else {
          setErrorMsg(msg);
          setTimeout(() => setErrorMsg(''), 4000);
        }
      };

      // 익명 계정 자동 로그인 처리
      React.useEffect(() => {
        auth.signInAnonymously().catch((err) => {
          console.error("클라우드 자동 인증 에러:", err);
          triggerToast('error', '클라우드 인증에 실패했습니다.');
        });
        return auth.onAuthStateChanged(u => setUser(u));
      }, []);

      // 실시간 Firestore 데이터 동기화 리스너 바인딩
      React.useEffect(() => {
        if (!user) return;
        setLoading(true);
        const unsubscribe = db.collection('church_items').onSnapshot(
          snapshot => {
            const fetched = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // 최근 등록일 순서로 정렬
            fetched.sort((a, b) => b.purchaseDate.localeCompare(a.purchaseDate));
            setItems(fetched);
            setLoading(false);
          },
          (err) => {
            console.error("데이터 가져오기 에러:", err);
            triggerToast('error', '데이터 연동 과정에서 오류가 발생했습니다.');
            setLoading(false);
          }
        );
        return () => unsubscribe();
      }, [user]);

      // 신규 등록을 위한 폼 초기화 후 열기
      const handleOpenNewModal = () => {
        setEditingItem(null);
        setFormData({
          name: '',
          category: '예배/강단',
          quantity: 1,
          location: '',
          purchaseDate: new Date().toISOString().split('T')[0],
          price: '',
          manager: '',
          memo: '',
          status: '사용중',
          disposalDate: '',
          disposalReason: ''
        });
        setIsFormOpen(true);
      };

      // 기존 물품 상세 정보 수정을 위한 안전 데이터 매핑 후 열기
      const handleOpenEditModal = (item) => {
        setEditingItem(item);
        setFormData({
          name: item.name || '',
          category: item.category || '예배/강단',
          quantity: item.quantity ?? 1,
          location: item.location === '미정' ? '' : (item.location || ''),
          purchaseDate: item.purchaseDate || new Date().toISOString().split('T')[0],
          price: item.price ?? '',
          manager: item.manager === '미정' ? '' : (item.manager || ''),
          memo: item.memo || '',
          status: item.status || '사용중',
          disposalDate: item.disposalDate || '',
          disposalReason: item.disposalReason || ''
        });
        setIsFormOpen(true);
      };

      // 물품 신규 추가 및 변경사항 저장
      const handleSave = async (e) => {
        e.preventDefault();
        if (!formData.name.trim()) return triggerToast('error', '물품명을 정확히 기재해 주세요.');
        try {
          const payload = {
            name: formData.name.trim(),
            category: formData.category,
            quantity: Number(formData.quantity) || 1,
            price: formData.price ? Number(formData.price) : 0,
            location: formData.location.trim() || '미정',
            manager: formData.manager.trim() || '미정',
            memo: (formData.memo || '').trim(),
            status: formData.status || '사용중',
            disposalDate: formData.status === '폐기됨' ? (formData.disposalDate || new Date().toISOString().split('T')[0]) : '',
            disposalReason: formData.status === '폐기됨' ? (formData.disposalReason || '연한 만료 및 노후화') : '',
            updatedAt: new Date().toISOString()
          };
          
          if (editingItem) {
            // 수정 시 Firestore ID 오염을 방지하기 위해 payload 만 업데이트
            await db.collection('church_items').doc(editingItem.id).update(payload);
            triggerToast('success', '물품 상세정보가 성공적으로 수정되었습니다.');
          } else {
            await db.collection('church_items').add({ 
              ...payload, 
              createdAt: new Date().toISOString() 
            });
            triggerToast('success', '새로운 물품정보가 완벽히 등록되었습니다.');
          }
          setIsFormOpen(false);
          setEditingItem(null);
        } catch (err) {
          console.error(err);
          triggerToast('error', '클라우드 저장 도중 오류가 발생했습니다.');
        }
      };

      // 물품 폐기 정보 변경 승인
      const confirmDisposal = async () => {
        try {
          await db.collection('church_items').doc(targetItemId).update({
            status: '폐기됨', 
            disposalDate: disposalForm.date, 
            disposalReason: disposalForm.reason || '연한 만료 및 노후화'
          });
          triggerToast('success', '해당 자산의 폐기 처리가 승인되었습니다.');
          setIsDisposalOpen(false);
        } catch {
          triggerToast('error', '폐기 처리에 실패했습니다.');
        }
      };

      // 물품 완전 영구 삭제
      const confirmDelete = async () => {
        try {
          await db.collection('church_items').doc(targetItemId).delete();
          triggerToast('success', '해당 물품이 영구히 삭제되었습니다.');
          setIsDeleteOpen(false);
        } catch {
          triggerToast('error', '삭제 처리 과정에 실패했습니다.');
        }
      };

      // 검색 및 분류 가공
      const filteredItems = React.useMemo(() => {
        return items.filter(item => {
          if (selectedCategory !== '전체' && item.category !== selectedCategory) return false;
          if (selectedStatus !== '전체' && item.status !== selectedStatus) return false;
          if (searchTerm.trim()) {
            const q = searchTerm.toLowerCase();
            return (
              item.name.toLowerCase().includes(q) || 
              item.location.toLowerCase().includes(q) || 
              item.manager.toLowerCase().includes(q)
            );
          }
          return true;
        });
      }, [items, selectedCategory, selectedStatus, searchTerm]);

      // 통계 계산
      const stats = React.useMemo(() => {
        const active = items.filter(i => i.status === '사용중');
        return {
          total: items.length,
          active: active.length,
          disposed: items.filter(i => i.status === '폐기됨').length,
          value: active.reduce((acc, cur) => acc + ((cur.price || 0) * (cur.quantity || 1)), 0)
        };
      }, [items]);

      // 엑셀 저장
      const downloadExcel = () => {
        const headers = ['물품명', '카테고리', '수량', '비치장소', '구입시기', '구입가격(원)', '관리자', '상태', '폐기일', '사유'];
        const rows = filteredItems.map(i => [
          i.name, i.category, i.quantity, i.location, i.purchaseDate, i.price || 0, i.manager, i.status, i.disposalDate||'', i.disposalReason||''
        ]);
        const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `부산진성결교회_물품대장_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
      };

      // 예시 데이터 마이그레이션
      const addSampleData = async () => {
        const samples = [
          { name: '대예배실 그랜드 피아노', category: '악기/음향', quantity: 1, location: '본당', purchaseDate: '2024-04-12', price: 12500000, manager: '예배위원회', status: '사용중', memo: '매년 정기 조율 필요' },
          { name: '재정부 비밀번호 금고', category: '사무/교육', quantity: 1, location: '재정부실', purchaseDate: '2025-02-10', price: 650000, manager: '재정부장', status: '사용중', memo: '예비 비밀번호 키 확인 대조' },
          { name: '목양실 서재용 테이블', category: '사무/교육', quantity: 1, location: '목양실', purchaseDate: '2025-05-18', price: 420000, manager: '담임목사', status: '사용중', memo: '원목 자재' },
          { name: '식당 대형 식기세척기', category: '주방/식당', quantity: 1, location: '주방', purchaseDate: '2023-11-02', price: 2300000, manager: '봉사회', status: '사용중', memo: '필터 상태 수시 확인' }
        ];
        for (const s of samples) { 
          await db.collection('church_items').add({ ...s, createdAt: new Date().toISOString() }); 
        }
        triggerToast('success', '4개의 대표성 자산 샘플이 생성되었습니다.');
      };

      if (isPrintFriendly) {
        return (
          <div className="p-8 bg-white text-black min-h-screen font-sans">
            <div className="flex justify-between items-center border-b-2 border-black pb-3 mb-6">
              <div>
                <h1 className="text-2xl font-bold">⛪ 부산진성결교회 물품대장</h1>
                <p className="text-xs text-slate-500 mt-1">출력일시: {new Date().toLocaleString()}</p>
              </div>
              <div className="text-right text-xs">
                <div>분류: {selectedCategory}</div>
                <div>상태: {selectedStatus}</div>
              </div>
            </div>

            <table className="w-full border-collapse border border-black text-xs">
              <thead>
                <tr className="bg-slate-100">
                  <th className="border border-black p-2 text-center w-[5%]">번호</th>
                  <th className="border border-black p-2 text-left w-[25%]">물품명</th>
                  <th className="border border-black p-2 text-left w-[12%]">분류</th>
                  <th className="border border-black p-2 text-center w-[7%]">수량</th>
                  <th className="border border-black p-2 text-left w-[15%]">비치 장소</th>
                  <th className="border border-black p-2 text-center w-[12%]">구입일</th>
                  <th className="border border-black p-2 text-right w-[12%]">단가</th>
                  <th className="border border-black p-2 text-left w-[12%]">관리자</th>
                </tr>
              </thead>
              <tbody>
                {filteredItems.map((item, idx) => (
                  <tr key={item.id} className="border-b border-slate-300">
                    <td className="border border-black p-2 text-center">{idx + 1}</td>
                    <td className="border border-black p-2 font-semibold">
                      {item.name}
                      {item.status === '폐기됨' && <span className="text-[10px] text-red-600 block">(폐기일: {item.disposalDate})</span>}
                    </td>
                    <td className="border border-black p-2">{item.category}</td>
                    <td className="border border-black p-2 text-center">{item.quantity}</td>
                    <td className="border border-black p-2">{item.location}</td>
                    <td className="border border-black p-2 text-center">{item.purchaseDate}</td>
                    <td className="border border-black p-2 text-right">{(item.price || 0).toLocaleString()}원</td>
                    <td className="border border-black p-2">{item.manager}</td>
                  </tr>
                ))}
              </tbody>
            </table>

            <div className="mt-12 flex justify-between text-xs">
              <div>부산진성결교회 행정부 대조 필</div>
              <div className="flex gap-8">
                <div>담당부서 확인: ________________ (인)</div>
                <div>당회 최종 결재: ________________ (인)</div>
              </div>
            </div>

            <button 
              onClick={() => setIsPrintFriendly(false)} 
              className="mt-6 px-4 py-2 bg-slate-900 text-white rounded-lg text-sm print-hide cursor-pointer hover:bg-slate-800 transition"
            >
              화면 대시보드로 돌아가기
            </button>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* 다이나믹 토스트 알림창 */}
          {successMsg && <div className="fixed top-4 right-4 bg-emerald-600 text-white px-4 py-3 rounded-lg shadow-xl z-50 text-xs font-semibold animate-bounce">{successMsg}</div>}
          {errorMsg && <div className="fixed top-4 right-4 bg-rose-600 text-white px-4 py-3 rounded-lg shadow-xl z-50 text-xs font-semibold">{errorMsg}</div>}

          {/* 헤더 바 */}
          <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-3">
              <div>
                <h1 className="text-base sm:text-xl font-black flex items-center gap-2">
                  <span className="text-lg">⛪</span> 부산진성결교회 스마트 물품 관리 시스템
                </h1>
                <p className="text-[10px] text-slate-400 mt-0.5">클라우드 실시간 동기화 및 다중 사용자 제어</p>
              </div>
              <button 
                onClick={handleOpenNewModal} 
                className="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs py-2.5 px-4 rounded-lg flex items-center gap-1.5 shadow-lg cursor-pointer transform active:scale-95 transition"
              >
                <Icon.Plus /> 새 물품 등록하기
              </button>
            </div>
          </header>

          {/* 메인 통계 영역 */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 space-y-4">
            
            <section className="grid grid-cols-2 lg:grid-cols-4 gap-4">
              <div className="bg-white p-5 rounded-xl border border-slate-200/80 shadow-xs">
                <p className="text-[11px] text-slate-400 font-bold uppercase tracking-wider">총 자산 품목</p>
                <h3 className="text-2xl font-black text-slate-800 mt-1">{stats.total}개</h3>
              </div>
              <div className="bg-white p-5 rounded-xl border border-slate-200/80 shadow-xs">
                <p className="text-[11px] text-emerald-500 font-bold uppercase tracking-wider">현재 사용중</p>
                <h3 className="text-2xl font-black text-emerald-600 mt-1">{stats.active}개</h3>
              </div>
              <div className="bg-white p-5 rounded-xl border border-slate-200/80 shadow-xs">
                <p className="text-[11px] text-amber-500 font-bold uppercase tracking-wider">폐기 처분품</p>
                <h3 className="text-2xl font-black text-amber-600 mt-1">{stats.disposed}개</h3>
              </div>
              <div className="bg-white p-5 rounded-xl border border-slate-200/80 shadow-xs">
                <p className="text-[11px] text-indigo-500 font-bold uppercase tracking-wider">현재 자산 가치</p>
                <h3 className="text-xl font-black text-indigo-600 mt-1">{stats.value.toLocaleString()}원</h3>
              </div>
            </section>

            {/* 검색 및 필터 패널 */}
            <section className="bg-white p-4 rounded-xl border border-slate-200/80 flex flex-col gap-3 shadow-xs">
              <div className="flex flex-col sm:flex-row gap-2">
                <div className="relative flex-1">
                  <span className="absolute left-3 top-2.5"><Icon.Search /></span>
                  <input 
                    type="text" 
                    placeholder="물품명, 장소, 관리 책임자 이름 실시간 검색..." 
                    value={searchTerm} 
                    onChange={e => setSearchTerm(e.target.value)} 
                    className="w-full bg-slate-50 border border-slate-200 rounded-lg pl-9 pr-4 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  />
                </div>
                <div className="flex gap-2">
                  <select 
                    value={selectedCategory} 
                    onChange={e => setSelectedCategory(e.target.value)} 
                    className="bg-slate-50 border border-slate-200 text-xs rounded-lg px-3 py-2 font-semibold text-slate-700 cursor-pointer"
                  >
                    <option>전체</option>
                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                  <select 
                    value={selectedStatus} 
                    onChange={e => setSelectedStatus(e.target.value)} 
                    className="bg-slate-50 border border-slate-200 text-xs rounded-lg px-3 py-2 font-semibold text-slate-700 cursor-pointer"
                  >
                    <option>전체</option>
                    <option>사용중</option>
                    <option>폐기됨</option>
                  </select>
                </div>
              </div>
              
              <div className="flex justify-between items-center border-t border-slate-100 pt-3 flex-wrap gap-2">
                {items.length === 0 && !loading && (
                  <button 
                    onClick={addSampleData} 
                    className="px-3.5 py-1.5 bg-indigo-50 text-indigo-700 text-xs rounded-lg border border-indigo-100 font-bold hover:bg-indigo-100 transition cursor-pointer"
                  >
                    💡 예시 샘플 데이터 채워넣기
                  </button>
                )}
                <div className="flex gap-2 ml-auto">
                  <button 
                    onClick={downloadExcel} 
                    className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2 px-3.5 rounded-lg flex items-center shadow-xs cursor-pointer transition"
                  >
                    <Icon.Excel />엑셀로 저장 (CSV)
                  </button>
                  <button 
                    onClick={() => { setIsPrintFriendly(true); setTimeout(() => window.print(), 300); }} 
                    className="bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold py-2 px-3.5 rounded-lg flex items-center shadow-xs cursor-pointer transition"
                  >
                    <Icon.Printer />표 형식 장부 인쇄
                  </button>
                </div>
              </div>
            </section>

            {/* 대형 데이터 목록 그리드 */}
            <section className="bg-white rounded-xl border border-slate-200/80 overflow-hidden shadow-xs">
              
              {loading ? (
                <div className="p-16 text-center text-slate-400">
                  <div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                  <p className="text-xs">클라우드 데이터와 동기화 중...</p>
                </div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-xs">
                    <thead className="bg-slate-100/70 text-slate-500 font-bold border-b border-slate-200/80">
                      <tr>
                        <th className="p-3.5">자산/물품 정보</th>
                        <th className="p-3.5">분류 / 수량</th>
                        <th className="p-3.5">비치 장소</th>
                        <th className="p-3.5">구입시기</th>
                        <th className="p-3.5">단가 (원)</th>
                        <th className="p-3.5">관리 담당자</th>
                        <th className="p-3.5 text-center">자산 통제</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {filteredItems.map(item => (
                        <tr key={item.id} className={`hover:bg-slate-50/50 transition-colors ${item.status === '폐기됨' ? 'bg-amber-50/20' : ''}`}>
                          <td className="p-3.5 font-semibold text-slate-900">
                            <div className="flex items-center gap-1.5">
                              {item.name}
                              {item.status === '폐기됨' && <span className="bg-rose-100 text-rose-800 border border-rose-200 text-[10px] px-1 py-0.5 rounded-md font-bold">폐기됨</span>}
                            </div>
                            {item.memo && <p className="text-[10px] text-slate-400 font-normal mt-0.5 max-w-sm line-clamp-2">{item.memo}</p>}
                            {item.status === '폐기됨' && (
                              <p className="text-[10px] text-amber-700 mt-1.5 font-medium">
                                사유: {item.disposalReason} ({item.disposalDate})
                              </p>
                            )}
                          </td>
                          <td className="p-3.5">
                            <span className="bg-slate-100 text-slate-700 px-2 py-0.5 rounded-full text-[10px] font-bold inline-block mb-1">{item.category}</span>
                            <div className="font-semibold text-slate-600">{item.quantity} 개</div>
                          </td>
                          <td className="p-3.5 text-slate-600 font-medium">{item.location}</td>
                          <td className="p-3.5 text-slate-500">{item.purchaseDate}</td>
                          <td className="p-3.5 font-semibold">{(item.price || 0).toLocaleString()}원</td>
                          <td className="p-3.5 text-slate-600 font-medium">{item.manager}</td>
                          <td className="p-3.5">
                            <div className="flex justify-center gap-1.5">
                              {/* 세부 정보 수정을 완벽하게 호출하는 제어 버튼 */}
                              <button 
                                onClick={() => handleOpenEditModal(item)} 
                                className="p-1.5 hover:bg-indigo-50 text-indigo-600 hover:text-indigo-800 rounded-lg cursor-pointer transition" 
                                title="물품 정보 수정"
                              >
                                <Icon.Edit />
                              </button>
                              {item.status === '사용중' && (
                                <button onClick={() => { setTargetItemId(item.id); setDisposalForm({date: new Date().toISOString().split('T')[0], reason: ''}); setIsDisposalOpen(true); }} className="p-1.5 hover:bg-slate-100 rounded-lg cursor-pointer" title="폐기처리"><Icon.Disposal /></button>
                              )}
                              <button onClick={() => { setTargetItemId(item.id); setIsDeleteOpen(true); }} className="p-1.5 hover:bg-slate-100 rounded-lg cursor-pointer" title="자산삭제"><Icon.Trash /></button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {filteredItems.length === 0 && (
                        <tr>
                          <td colSpan="7" className="text-center py-16 text-slate-400 text-xs">상단 검색 조건에 해당하는 물품 기록이 없습니다.</td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              )}

            </section>
          </main>

          {/* 하단 저작권 푸터 */}
          <footer className="bg-slate-100 border-t border-slate-200/80 py-6 text-center text-[11px] text-slate-400">
            <p>© {new Date().getFullYear()} 부산진성결교회 행정위원회 · 스마트 자산 통합 시스템</p>
          </footer>

          {}
          {isFormOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-zoom-in">
                
                <div className="bg-slate-900 text-white p-4 flex justify-between items-center">
                  <h3 className="text-sm font-bold flex items-center gap-1.5">
                    <span>📦</span> {editingItem ? '물품 세부정보 수정 (클라우드 반영)' : '새로운 물품 및 자산 등록'}
                  </h3>
                  <button onClick={() => setIsFormOpen(false)} className="text-slate-400 hover:text-white cursor-pointer"><Icon.Close /></button>
                </div>

                <form onSubmit={handleSave} className="p-5 space-y-4.5 text-xs">
                  <div>
                    <label className="block font-bold text-slate-500 mb-1">물품명 *</label>
                    <input 
                      type="text" 
                      required 
                      value={formData.name || ''} 
                      onChange={e => setFormData({...formData, name: e.target.value})} 
                      className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" 
                      placeholder="예: 신디사이저 야마하 MODX"
                    />
                  </div>
                  
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block font-bold text-slate-500 mb-1">자산 분류</label>
                      <select value={formData.category || '예배/강단'} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg bg-white font-semibold focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 mb-1">보유 수량</label>
                      <input type="number" min="1" required value={formData.quantity ?? 1} onChange={e => setFormData({...formData, quantity: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                    </div>
                  </div>

                  <div>
                    <label className="block font-bold text-slate-500 mb-1">비치 장소</label>
                    <input type="text" value={formData.location || ''} onChange={e => setFormData({...formData, location: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="예: 본당 2층 성가대실 수납장"/>
                    <div className="flex flex-wrap gap-1 mt-1.5 max-h-24 overflow-y-auto border border-slate-100 p-1.5 rounded-md bg-slate-50/50">
                      {SUGGESTED_LOCATIONS.map(l => (
                        <button type="button" key={l} onClick={() => setFormData({...formData, location: l})} className="bg-white hover:bg-indigo-50 hover:text-indigo-600 text-slate-500 font-medium rounded border border-slate-200/80 px-2 py-0.5 text-[10px] transition cursor-pointer">
                          {l}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block font-bold text-slate-500 mb-1">구입 시기</label>
                      <input type="date" value={formData.purchaseDate || ''} onChange={e => setFormData({...formData, purchaseDate: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                    </div>
                    <div>
                      <label className="block font-bold text-slate-500 mb-1">단가 (원)</label>
                      <input type="number" value={formData.price ?? ''} onChange={e => setFormData({...formData, price: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="숫자만 입력"/>
                    </div>
                  </div>

                  <div>
                    <label className="block font-bold text-slate-500 mb-1">관리 책임자/담당 부서</label>
                    <input type="text" value={formData.manager || ''} onChange={e => setFormData({...formData, manager: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="예: 재정부 김집사"/>
                  </div>

                  <div>
                    <label className="block font-bold text-slate-500 mb-1">비고 및 상세 기술(메모)</label>
                    <textarea value={formData.memo || ''} onChange={e => setFormData({...formData, memo: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" rows="2" placeholder="일련번호(S/N) 또는 수리 이력 등 기재"/>
                  </div>

                  <div className="flex justify-end gap-2 border-t border-slate-100 pt-3.5">
                    <button type="button" onClick={() => setIsFormOpen(false)} className="px-3.5 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg cursor-pointer hover:bg-slate-200 transition">취소</button>
                    <button type="submit" className="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg cursor-pointer hover:bg-indigo-700 transition shadow-md">
                      {editingItem ? '수정 완료 (저장)' : '새 자산 저장'}
                    </button>
                  </div>
                </form>

              </div>
            </div>
          )}

          {}
          {/* 자산 폐기 처리용 입력 모달 */}
          {isDisposalOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm p-5 text-xs space-y-4">
                <h3 className="font-bold text-sm text-amber-600 flex items-center gap-1.5">
                  <span>⚠</span> 물품 대장 폐기 등록
                </h3>
                <p className="text-[11px] text-slate-500 leading-relaxed">선택한 물품을 사용 종료(폐기됨) 상태로 전환합니다. 이 기록은 삭제되지 않고 보존됩니다.</p>
                <div>
                  <label className="block font-bold text-slate-500 mb-1">폐기 처분 날짜</label>
                  <input type="date" value={disposalForm.date} onChange={e => setDisposalForm({...disposalForm, date: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none"/>
                </div>
                <div>
                  <label className="block font-bold text-slate-500 mb-1">구체적인 처분 사유</label>
                  <input type="text" placeholder="예: 부품 단선으로 수리 불가능" value={disposalForm.reason} onChange={e => setDisposalForm({...disposalForm, reason: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none"/>
                </div>
                <div className="flex justify-end gap-2 pt-2 border-t border-slate-100">
                  <button onClick={() => setIsDisposalOpen(false)} className="px-3.5 py-1.5 bg-slate-100 rounded-lg cursor-pointer font-bold hover:bg-slate-200 transition">취소</button>
                  <button onClick={confirmDisposal} className="px-4 py-1.5 bg-amber-600 text-white rounded-lg cursor-pointer font-bold hover:bg-amber-700 transition shadow-md">폐기 확정</button>
                </div>
              </div>
            </div>
          )}

          {/* 자산 완벽 영구삭제 의사 재확인 모달 */}
          {isDeleteOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center text-xs space-y-4">
                <div className="w-12 h-12 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto text-xl font-bold">!</div>
                <h3 className="font-bold text-sm text-rose-600">물품 자산 기록 영구 삭제</h3>
                <p className="text-slate-500 leading-relaxed">이 승인은 되돌릴 수 없으며 클라우드 내 데이터베이스에서 자산이 완전히 삭제되어 타인의 PC 화면에서도 즉각 사라집니다.<br />정말 삭제 처리를 계속 진행하시겠습니까?</p>
                <div className="flex gap-2 pt-2">
                  <button onClick={() => setIsDeleteOpen(false)} className="flex-1 py-2.5 bg-slate-100 rounded-lg cursor-pointer font-bold hover:bg-slate-200 transition">취소</button>
                  <button onClick={confirmDelete} className="flex-1 py-2.5 bg-rose-600 text-white rounded-lg cursor-pointer font-bold hover:bg-rose-700 transition shadow-md">자산 기록 즉시삭제</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // DOM 컨테이너 마운트 실행
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
