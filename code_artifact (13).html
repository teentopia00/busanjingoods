<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부산진성결교회 스마트 물품 관리 시스템</title>
  
  <!-- 라이브러리 CDN 로드 (React, Tailwind CSS, Firebase) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Compat 라이브러리 (v10.8.0) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>

  <!-- Pretendard 웹폰트 적용 (가독성 향상) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    @media print {
      .print-hide {
        display: none !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

  <div id="root"></div>

  <script type="text/babel">
    // 제공해주신 부산진성결교회 전용 파이어베이스 설정값 주입 완료
    const firebaseConfig = {
      apiKey: "AIzaSyCQnYCmCXjPtyiV_7QitJoJetx25Ful17s",
      authDomain: "happynjin-13a6f.firebaseapp.com",
      projectId: "happynjin-13a6f",
      storageBucket: "happynjin-13a6f.firebasestorage.app",
      messagingSenderId: "516570678326",
      appId: "1:516570678326:web:5d2b8ac8c1b7d9de1c0497",
      measurementId: "G-3DQYV6V78W"
    };

    // Firebase 및 플러그인 초기화
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const analytics = firebase.analytics();

    // 서비스에서 공용으로 관리하는 카테고리 정의
    const CATEGORIES = ['예배/강단', '미디어/방송', '사무/교육', '주방/식당', '차량/기계', '악기/음향', '기타'];
    
    // 부산진성결교회 전용 장소 추천 리스트
    const SUGGESTED_LOCATIONS = [
      '본당', '재정부실', '주방', '목양실', '방송실', '사무실', '교육관', '식당', '지하기도실',
      '1층 포지티브홀', '쿰바야룸', '1층미니카페', '중3층 유아실', '본당 미니카페',
      '남자 화장실', '여자화장실', '주방창고', '교육관창고'
    ];

    // UI 디자인용 경량 인라인 SVG 아이콘 컴포넌트셋
    const Icon = {
      Search: () => (
        <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      ),
      Plus: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      ),
      Edit: () => (
        <svg className="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      ),
      Trash: () => (
        <svg className="w-4 h-4 text-rose-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      ),
      Disposal: () => (
        <svg className="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
          <polyline points="17 18 23 18 23 12"></polyline>
        </svg>
      ),
      Excel: () => (
        <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
      ),
      Printer: () => (
        <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
      ),
      Close: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      )
    };

    // 한국 표준시(KST) 기준 로컬 날짜 구하기
    const getLocalTodayString = () => {
      const offset = new Date().getTimezoneOffset() * 60000;
      const localISODate = new Date(Date.now() - offset).toISOString();
      return localISODate.split('T')[0];
    };

    // React 입력 데이터 폼 초기 기본 뼈대
    const INITIAL_FORM_DATA = {
      name: '',
      category: '예배/강단',
      quantity: 1,
      location: '',
      purchaseDate: getLocalTodayString(),
      price: '',
      manager: '',
      memo: '',
      status: '사용중',
      disposalDate: '',
      disposalReason: ''
    };

    function App() {
      const [user, setUser] = React.useState(null);
      const [items, setItems] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [connError, setConnError] = React.useState(null); // 실시간 자가진단 에러 필드
      const [searchTerm, setSearchTerm] = React.useState('');
      const [selectedCategory, setSelectedCategory] = React.useState('전체');
      const [selectedStatus, setSelectedStatus] = React.useState('전체');
      
      // 모달/UI 제어 상태
      const [isFormOpen, setIsFormOpen] = React.useState(false);
      const [isDisposalOpen, setIsDisposalOpen] = React.useState(false);
      const [isDeleteOpen, setIsDeleteOpen] = React.useState(false);
      const [editingItem, setEditingItem] = React.useState(null);
      const [targetItemId, setTargetItemId] = React.useState(null);

      // 토스트 피드백 메시지
      const [successMsg, setSuccessMsg] = React.useState('');
      const [errorMsg, setErrorMsg] = React.useState('');

      // 입력 데이터 폼 양식 상태
      const [formData, setFormData] = React.useState({ ...INITIAL_FORM_DATA });
      const [disposalForm, setDisposalForm] = React.useState({ date: getLocalTodayString(), reason: '' });
      const [isPrintFriendly, setIsPrintFriendly] = React.useState(false);

      // 토스트 발송기 함수
      const triggerToast = (type, msg) => {
        if (type === 'success') {
          setSuccessMsg(msg);
          setTimeout(() => setSuccessMsg(''), 3000);
        } else {
          setErrorMsg(msg);
          setTimeout(() => setErrorMsg(''), 4000);
        }
      };

      // 익명 계정 자동 로그인 처리
      React.useEffect(() => {
        auth.signInAnonymously()
          .then((cred) => {
            analytics.logEvent('login', { method: 'anonymous_church_dashboard' });
          })
          .catch((err) => {
            console.error("클라우드 자동 인증 에러:", err);
            setConnError({
              code: err.code || 'UNKNOWN',
              message: err.message,
              type: 'AUTH'
            });
            setLoading(false);
          });
        return auth.onAuthStateChanged(u => setUser(u));
      }, []);

      // 실시간 Firestore 데이터 동기화 리스너 바인딩
      React.useEffect(() => {
        if (!user) return;
        setLoading(true);
        const unsubscribe = db.collection('church_items').onSnapshot(
          snapshot => {
            const fetched = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // [오류 정밀 해결] 값이 비어있는 비정상 자산 정보가 데이터베이스에 섞여 있더라도 절대 정렬 에러를 내지 않도록 삼중 안전장치 추가
            fetched.sort((a, b) => {
              const dateA = String(a && a.purchaseDate ? a.purchaseDate : '');
              const dateB = String(b && b.purchaseDate ? b.purchaseDate : '');
              const nameA = String(a && a.name ? a.name : '');
              const nameB = String(b && b.name ? b.name : '');
              return dateB.localeCompare(dateA) || nameA.localeCompare(nameB);
            });

            setItems(fetched);
            setConnError(null); // 에러가 해제되면 초기화
            setLoading(false);
          },
          (err) => {
            console.error("데이터 가져오기 에러:", err);
            setConnError({
              code: err.code || 'UNKNOWN',
              message: err.message,
              type: 'FIRESTORE'
            });
            setLoading(false);
          }
        );
        return () => unsubscribe();
      }, [user]);

      // 신규 등록을 위한 폼 초기화 후 열기
      const handleOpenNewModal = () => {
        setEditingItem(null);
        setFormData({ ...INITIAL_FORM_DATA });
        setIsFormOpen(true);
      };

      // 기존 물품 수정 모달 열기 (안전한 필드 대조 보정)
      const handleOpenEditModal = (item) => {
        setEditingItem(item);
        setFormData({
          name: item.name || '',
          category: item.category || '예배/강단',
          quantity: item.quantity ?? 1,
          location: item.location === '미정' ? '' : (item.location || ''),
          purchaseDate: item.purchaseDate || getLocalTodayString(),
          price: item.price ?? '',
          manager: item.manager === '미정' ? '' : (item.manager || ''),
          memo: item.memo || '',
          status: item.status || '사용중',
          disposalDate: item.disposalDate || '',
          disposalReason: item.disposalReason || ''
        });
        setIsFormOpen(true);
      };

      // 등록 및 수정 모달 종료 (초기화 누락 해결)
      const handleCloseForm = () => {
        setIsFormOpen(false);
        setEditingItem(null);
        setFormData({ ...INITIAL_FORM_DATA });
      };

      // 물품 신규 추가 및 변경사항 저장 (Payload 오염 제거)
      const handleSave = async (e) => {
        e.preventDefault();
        if (!formData.name.trim()) return triggerToast('error', '물품명을 정확히 기재해 주세요.');
        
        try {
          // 순수 입력 데이터 필드만 명확히 바인딩하여 Payload 추출
          const payload = {
            name: formData.name.trim(),
            category: formData.category,
            quantity: Number(formData.quantity) || 1,
            price: formData.price ? Number(formData.price) : 0,
            location: formData.location.trim() || '미정',
            purchaseDate: formData.purchaseDate || getLocalTodayString(),
            manager: formData.manager.trim() || '미정',
            memo: (formData.memo || '').trim(),
            status: formData.status || '사용중',
            disposalDate: formData.status === '폐기됨' ? (formData.disposalDate || getLocalTodayString()) : '',
            disposalReason: formData.status === '폐기됨' ? (formData.disposalReason || '연한 만료 및 노후화') : '',
            updatedAt: new Date().toISOString()
          };
          
          if (editingItem) {
            // 수정 모드
            await db.collection('church_items').doc(editingItem.id).update(payload);
            triggerToast('success', '물품 상세정보가 성공적으로 수정되었습니다.');
          } else {
            // 신규 등록 모드
            await db.collection('church_items').add({ 
              ...payload, 
              createdAt: new Date().toISOString() 
            });
            triggerToast('success', '새로운 물품정보가 완벽히 등록되었습니다.');
          }
          
          // 모달 및 상태 전면 초기화
          handleCloseForm();
        } catch (err) {
          console.error("데이터 저장 실패 상세 오류:", err);
          triggerToast('error', `클라우드 저장 도중 오류가 발생했습니다: ${err.message || err}`);
        }
      };

      // 물품 폐기 정보 변경 승인
      const confirmDisposal = async () => {
        try {
          await db.collection('church_items').doc(targetItemId).update({
            status: '폐기됨', 
            disposalDate: disposalForm.date, 
            disposalReason: disposalForm.reason || '연한 만료 및 노후화'
          });
          triggerToast('success', '해당 자산의 폐기 처리가 승인되었습니다.');
          setIsDisposalOpen(false);
        } catch (err) {
          console.error("폐기 처리 실패:", err);
          triggerToast('error', '폐기 처리에 실패했습니다.');
        }
      };

      // 물품 완전 영구 삭제
      const confirmDelete = async () => {
        try {
          await db.collection('church_items').doc(targetItemId).delete();
          triggerToast('success', '해당 물품이 영구히 삭제되었습니다.');
          setIsDeleteOpen(false);
        } catch (err) {
          console.error("삭제 실패:", err);
          triggerToast('error', '삭제 처리 과정에 실패했습니다.');
        }
      };

      // 검색 및 분류 데이터 가공
      const filteredItems = React.useMemo(() => {
        return items.filter(item => {
          if (selectedCategory !== '전체' && item.category !== selectedCategory) return false;
          if (selectedStatus !== '전체' && item.status !== selectedStatus) return false;
          if (searchTerm.trim()) {
            const q = searchTerm.toLowerCase();
            const nameField = item.name || '';
            const locationField = item.location || '';
            const managerField = item.manager || '';
            return (
              nameField.toLowerCase().includes(q) || 
              locationField.toLowerCase().includes(q) || 
              managerField.toLowerCase().includes(q)
            );
          }
          return true;
        });
      }, [items, selectedCategory, selectedStatus, searchTerm]);

      // 실시간 통계 산정
      const stats = React.useMemo(() => {
        const active = items.filter(i => i.status === '사용중');
        return {
          total: items.length,
          active: active.length,
          disposed: items.filter(i => i.status === '폐기됨').length,
          value: active.reduce((acc, cur) => acc + ((cur.price || 0) * (cur.quantity || 1)), 0)
        };
      }, [items]);

      // 엑셀(CSV) 저장 기능
      const downloadExcel = () => {
        const headers = ['물품명', '카테고리', '수량', '비치장소', '구입시기', '구입가격(원)', '관리자', '상태', '폐기일', '사유'];
        const rows = filteredItems.map(i => [
          i.name || '', i.category || '', i.quantity || 1, i.location || '', i.purchaseDate || '', i.price || 0, i.manager || '', i.status || '', i.disposalDate||'', i.disposalReason||''
        ]);
        const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `부산진성결교회_물품대장_${getLocalTodayString()}.csv`;
        link.click();
      };

      // 예시 데이터 마이그레이션 생성기
      const addSampleData = async () => {
        const samples = [
          { name: '대예배실 그랜드 피아노', category: '악기/음향', quantity: 1, location: '본당', purchaseDate: '2024-04-12', price: 12500000, manager: '예배위원회', status: '사용중', memo: '매년 정기 조율 필요' },
          { name: '재정부 비밀번호 금고', category: '사무/교육', quantity: 1, location: '재정부실', purchaseDate: '2025-02-10', price: 650000, manager: '재정부장', status: '사용중', memo: '예비 비밀번호 키 확인 대조' },
          { name: '목양실 서재용 테이블', category: '사무/교육', quantity: 1, location: '목양실', purchaseDate: '2025-05-18', price: 420000, manager: '담임목사', status: '사용중', memo: '원목 자재' },
          { name: '식당 대형 식기세척기', category: '주방/식당', quantity: 1, location: '주방', purchaseDate: '2023-11-02', price: 2300000, manager: '봉사회', status: '사용중', memo: '필터 상태 수시 확인' }
        ];
        for (const s of samples) { 
          await db.collection('church_items').add({ ...s, createdAt: new Date().toISOString() }); 
        }
        triggerToast('success', '4개의 대표성 자산 샘플이 생성되었습니다.');
      };

      // 파이어베이스 보안규칙 및 익명인증 비활성화 자가진단 에러 UI 출력
      if (connError) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6 font-sans text-slate-800">
            <div className="bg-white rounded-2xl shadow-xl max-w-lg w-full p-6 border border-slate-200">
              <div className="flex items-center gap-3 text-rose-600 mb-4">
                <span className="text-3xl">⚠️</span>
                <div>
                  <h2 className="text-lg font-black">클라우드 데이터베이스 연결 실패</h2>
                  <p className="text-xs text-slate-400 mt-0.5">시스템 자가진단 리포트</p>
                </div>
              </div>

              <div className="bg-rose-50/50 border border-rose-100 rounded-xl p-4 text-xs mb-6 space-y-2">
                <p className="font-semibold text-rose-800">에러 진단 정보:</p>
                <div className="grid grid-cols-3 gap-1 text-slate-600">
                  <span className="font-bold">에러 분류:</span>
                  <span className="col-span-2">{connError.type === 'AUTH' ? '로그인(인증) 오류' : '권한(규칙) 오류'}</span>
                  
                  <span className="font-bold">에러 코드:</span>
                  <span className="col-span-2 font-mono bg-white px-1.5 py-0.5 border border-slate-200 rounded text-rose-600 w-max">{connError.code}</span>
                  
                  <span className="font-bold">상세 메시지:</span>
                  <span className="col-span-2 text-slate-500 break-all">{connError.message}</span>
                </div>
              </div>

              <h3 className="text-sm font-bold text-slate-700 mb-2">💡 해결 가이드 (아래 내용을 따라 조치해 주세요)</h3>
              <div className="text-xs text-slate-600 space-y-3 leading-relaxed">
                {connError.type === 'AUTH' && (
                  <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <p className="font-bold text-indigo-600 mb-1">인증 비활성화 에러 해결법:</p>

                  <div className="flex justify-end gap-2 border-t border-slate-100 pt-3.5">
                    <button type="button" onClick={handleCloseForm} className="px-3.5 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg cursor-pointer hover:bg-slate-200 transition">취소</button>
                    <button type="submit" className="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg cursor-pointer hover:bg-indigo-700 transition shadow-md">
                      {editingItem ? '수정 완료 (저장)' : '새 자산 저장'}
                    </button>
                  </div>
                </form>

              </div>
            </div>
          )}

          {/* 자산 폐기 처리용 입력 모달 */}
          {isDisposalOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm p-5 text-xs space-y-4">
                <h3 className="font-bold text-sm text-amber-600 flex items-center gap-1.5">
                  <span>⚠</span> 물품 대장 폐기 등록
                </h3>
                <p className="text-[11px] text-slate-500 leading-relaxed">선택한 물품을 사용 종료(폐기됨) 상태로 전환합니다. 이 기록은 삭제되지 않고 보존됩니다.</p>
                <div>
                  <label className="block font-bold text-slate-500 mb-1">폐기 처분 날짜</label>
                  <input type="date" value={disposalForm.date} onChange={e => setDisposalForm({...disposalForm, date: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none"/>
                </div>
                <div>
                  <label className="block font-bold text-slate-500 mb-1">구체적인 처분 사유</label>
                  <input type="text" placeholder="예: 부품 단선으로 수리 불가능" value={disposalForm.reason} onChange={e => setDisposalForm({...disposalForm, reason: e.target.value})} className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none"/>
                </div>
                <div className="flex justify-end gap-2 pt-2 border-t border-slate-100">
                  <button onClick={() => setIsDisposalOpen(false)} className="px-3.5 py-1.5 bg-slate-100 rounded-lg cursor-pointer font-bold hover:bg-slate-200 transition">취소</button>
                  <button onClick={confirmDisposal} className="px-4 py-1.5 bg-amber-600 text-white rounded-lg cursor-pointer font-bold hover:bg-amber-700 transition shadow-md">폐기 확정</button>
                </div>
              </div>
            </div>
          )}

          {/* 자산 완벽 영구삭제 의사 재확인 모달 */}
          {isDeleteOpen && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 text-center text-xs space-y-4">
                <div className="w-12 h-12 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto text-xl font-bold">!</div>
                <h3 className="font-bold text-sm text-rose-600">물품 자산 기록 영구 삭제</h3>
                <p className="text-slate-500 leading-relaxed">이 승인은 되돌릴 수 없으며 클라우드 내 데이터베이스에서 자산이 완전히 삭제되어 타인의 PC 화면에서도 즉각 사라집니다.<br />정말 삭제 처리를 계속 진행하시겠습니까?</p>
                <div className="flex gap-2 pt-2">
                  <button onClick={() => setIsDeleteOpen(false)} className="flex-1 py-2.5 bg-slate-100 rounded-lg cursor-pointer font-bold hover:bg-slate-200 transition">취소</button>
                  <button onClick={confirmDelete} className="flex-1 py-2.5 bg-rose-600 text-white rounded-lg cursor-pointer font-bold hover:bg-rose-700 transition shadow-md">자산 기록 즉시삭제</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // DOM 컨테이너 마운트 실행
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
